scopeName: source.HexParse
patterns:
- include: '#INIT'
repository:
  # ── Layer 1: Comments (highest priority) ───────────
  COMMENTS:
    patterns:
    - match: //.*$
      name: comment.line
    - begin: /\*
      end: \*/
      name: comment.multiline

  # ── Layer 2: Structural (brackets, strings) ────────
  STRUCTURAL:
    patterns:
    - match: "\".*?\""
      name: string.literal.quotes
    - begin: \[
      beginCaptures:
        '0':
          name: keyword.control.nested.left
      end: \]
      endCaptures:
        '0':
          name: keyword.control.nested.right
      name: nested.list
      patterns:
      - include: '#INIT'
    - begin: '[\(\{]'
      beginCaptures:
        '0':
          name: keyword.control.group.left
      end: '[\)\}]'
      endCaptures:
        '0':
          name: keyword.control.group.right
      name: group.list
      patterns:
      - include: '#INIT'

  # ── Layer 3: Code content (lowest priority) ───────
  CUTTER:
    patterns:
    - name: code_cutter
      match: \\|[\w./\-:#\u0100-\uffff]+
      captures:
        "0":
          patterns:
          - include: '#macro'
          - include: '#comment_iota'
          - include: '#literal'
          - include: '#special_handler'
          - include: '#pattern'

  # ── Entry point ────────────────────────────────────
  INIT:
    patterns:
    - include: '#COMMENTS'
    - include: '#STRUCTURAL'
    - include: '#CUTTER'

  # ── Sub-rules ──────────────────────────────────────
  macro:
    patterns:
    - match: "#\\w+$"
      name: keyword.control.macro
  comment_iota:
    patterns:
    - match: comment_.*
      name: comment.iota
    - match: tab(_.*)?
      name: comment.iota.tab
  literal:
    patterns:
    - match: \\|escape$
      name: constant.character.escape
    - match: str_.*$
      name: string.literal
    - match: entity_[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      name: entity.name.type.entity
    - include: '#inner_literal'
  inner_literal:
    patterns:
    - match: (?i)(true|false)$
      name: constant.language.boolean
    - match: (?i)null$
      name: constant.language.null
    - match: (?i)garbage$
      name: constant.language.garbage
    - match: ([Mm][Yy])?[Ss][Ee][Ll][Ff]
      name: entity.name.type.myself
    - include: '#num'
  num:
    patterns:
    # Match proper numbers: optional leading -, must start with digit, optional decimal part, optional exponent
    # Avoids matching bare ".", ".5", "-" etc. as separate fragments inside vec_/gate_ args
    - match: '-?[0-9]+(\.[0-9]*)?(e[+\-]?[0-9]+)?'
      name: constant.numeric
  pattern:
    patterns:
    - match: (if|eval(/cc)?|for_each|halt|del|hermes|thoth|iris)$
      name: keyword.control.meta
    - match: num(_[0-9e.\-]+)?$
      name: keyword.num.pattern
      captures:
        "0":
          patterns:
          - include: '#num'
    - match: mask_[-v]+$
      name: keyword.mask
    - match: copy_mask_[-n]+$
      name: keyword.copymask
    - match: _[wedsaq]+$
      name: keyword.rawpattern
    - match: .+$
      name: variable.pattern
  special_handler:
    patterns:
    - match: vec(_[0-9e.\-]+){0,3}$
      name: keyword.vector.literal
      captures:
        "0":
          patterns:
          - include: '#num'
    - match: gate(_.+){0,4}$
      name: keyword.gate.literal
      captures:
        "0":
          patterns:
          - include: '#inner_literal'
    - match: type(/(iota|entity|block|item))?_(.*)$
      name: keyword.type.literal
      captures:
        "3":
          name: entity.name.namespace.typeid
    # ── Plugin types (addon mods) ──────────────────────
    # Hexcellular: Property
    - match: (my)?prop_.+$
      name: keyword.property.literal
    # Hex-Ars-Linker: Glyph Reference
    - match: glyph_.+$
      name: keyword.glyph.literal
    # HexPose: Identifier (ResourceLocation)
    - match: id_.+$
      name: keyword.identifier.rl
    # Oneironaut: Dimension
    - match: dim_.+$
      name: keyword.dim.literal
    # Ephemera: Status/Potion
    - match: potion_.+$
      name: keyword.potion.literal
    # MoreIotas: Matrix
    - match: (mat|matrix)_(.+)$
      name: keyword.matrix.literal
      captures:
        "2":
          patterns:
          - include: '#num'
    # Hexal: Mote
    - match: mote_.+$
      name: keyword.mote.literal
